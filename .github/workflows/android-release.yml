name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build And Publish APK
    runs-on: ubuntu-latest
    env:
      CI: true
      EXPO_NO_DOCTOR: 1
      APK_OUTPUT_PATH: android/app/build/outputs/apk/release/app-release.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install dependencies
        run: npm ci

      - name: Read app release config
        id: app_config
        run: node scripts/github-actions/read-app-config.mjs >> "$GITHUB_OUTPUT"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Decode Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing ANDROID_KEYSTORE_PASSWORD secret."
            exit 1
          fi
          node scripts/github-actions/configure-android-signing.mjs
          {
            echo ""
            echo "LABOUR_MANAGER_UPLOAD_STORE_FILE=upload-keystore.jks"
            echo "LABOUR_MANAGER_UPLOAD_KEY_ALIAS=labourmanager"
            echo "LABOUR_MANAGER_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "LABOUR_MANAGER_UPLOAD_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
          } >> android/gradle.properties

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp "$APK_OUTPUT_PATH" "dist/${{ steps.app_config.outputs.apk_asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.app_config.outputs.release_tag }}
          path: dist/${{ steps.app_config.outputs.apk_asset_name }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.app_config.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.app_config.outputs.release_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Replacing APK asset."
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --notes "Automated Android release for $RELEASE_NAME"
          fi
          gh release upload "$RELEASE_TAG" "dist/${{ steps.app_config.outputs.apk_asset_name }}" --clobber

      - name: Add download links to summary
        env:
          RELEASE_TAG: ${{ steps.app_config.outputs.release_tag }}
          APK_ASSET_NAME: ${{ steps.app_config.outputs.apk_asset_name }}
        run: |
          {
            echo "## Android APK Ready"
            echo ""
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
            echo "- Direct APK download: https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$APK_ASSET_NAME"
            echo "- Workflow artifact: Download \`android-apk-$RELEASE_TAG\` from this run"
          } >> "$GITHUB_STEP_SUMMARY"
